apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: api
          image: stuurwiel:local
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/api"]
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          envFrom:
            - configMapRef:
                name: stuurwiel-brokers
            - secretRef:
                name: stuurwiel-secrets
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: HTTP_ADDR
              value: ":8080"
            - name: GRPC_ADDR
              value: ":9090"
            - name: MAX_RECONNECT_ATTEMPTS
              value: "100"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi

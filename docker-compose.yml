services:
  # Kafka KRaft (no Zookeeper), Confluent 7.5 image.
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    # Wait until topic exists with a leader (avoids publish before partition is ready).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 && kafka-topics --bootstrap-server localhost:9092 --if-not-exists --create --topic stuurwiel-messages --partitions 1 --replication-factor 1 >/dev/null 2>&1 && kafka-topics --bootstrap-server localhost:9092 --describe --topic stuurwiel-messages 2>/dev/null | grep -q 'Leader: 1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/api"]
    environment:
      LOG_LEVEL: debug
      NATS_URL: nats://nats:4222
      KAFKA_BROKERS: kafka:29092
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      kafka:
        condition: service_healthy
      nats:
        condition: service_started
      rabbitmq:
        condition: service_started

  worker-nats-kafka:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/worker-nats-kafka"]
    environment:
      LOG_LEVEL: info
      FORWARD_PROBABILITY: "0.55"
      WORKER_CONCURRENCY: "10"
      NATS_URL: nats://nats:4222
      NATS_QUEUE_GROUP: stuurwiel-worker-nats-kafka
      KAFKA_BROKERS: kafka:29092
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      RECONNECT_INITIAL_DELAY: 2s
      RECONNECT_MAX_DELAY: 2m
      RECONNECT_JITTER_MAX: 50ms
      MAX_RECONNECT_ATTEMPTS: "100"

  worker-kafka-rabbit:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/worker-kafka-rabbit"]
    environment:
      LOG_LEVEL: info
      FORWARD_PROBABILITY: "0.55"
      WORKER_CONCURRENCY: "10"
      NATS_URL: nats://nats:4222
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: stuurwiel-worker-kafka-rabbit
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      RECONNECT_INITIAL_DELAY: 2s
      RECONNECT_MAX_DELAY: 2m
      RECONNECT_JITTER_MAX: 50ms
      MAX_RECONNECT_ATTEMPTS: "100"

  worker-rabbit-nats:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/worker-rabbit-nats"]
    environment:
      LOG_LEVEL: info
      FORWARD_PROBABILITY: "0.55"
      WORKER_CONCURRENCY: "10"
      NATS_URL: nats://nats:4222
      KAFKA_BROKERS: kafka:29092
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      RECONNECT_INITIAL_DELAY: 2s
      RECONNECT_MAX_DELAY: 2m
      RECONNECT_JITTER_MAX: 50ms
      MAX_RECONNECT_ATTEMPTS: "100"
